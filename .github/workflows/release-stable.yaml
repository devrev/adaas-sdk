# This workflow releases a stable version of @devrev/ts-adaas to npm when a PR
# with a version bump in package.json is merged to the stable branch.
#
# - release:
# 1. Triggered automatically on push to the stable branch.
# 2. Compares the version in package.json against the latest stable version on
#    npm. If unchanged, the workflow skips the release.
# 3. Runs tests.
# 4. Publishes to npm with the "latest" tag.
# 5. Creates a git tag and pushes it.
# 6. Opens a PR to merge stable back into main.
#
# - generate-release-notes:
# 1. Generates release notes using softprops/action-gh-release and creates a
#    GitHub release.

name: Release stable
run-name: "Release stable by ${{ github.actor }}"

on:
  push:
    branches: [stable]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_SVC_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org/
          node-version: 22.14.0
          scope: "@devrev"

      - name: Check if version changed
        id: version
        run: |
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "Current package.json version: $CURRENT_VERSION"

          LATEST_VERSION=$(npm view @devrev/ts-adaas dist-tags.latest 2>/dev/null || echo "0.0.0")
          echo "Latest published stable version: $LATEST_VERSION"

          if [ "$CURRENT_VERSION" == "$LATEST_VERSION" ]; then
            echo "Version unchanged, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Version changed: $LATEST_VERSION -> $CURRENT_VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "NEW_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          fi

      - name: Run tests
        if: steps.version.outputs.should_release == 'true'
        run: |
          npm ci
          npm run build
          npm run test

      - name: Git configuration
        if: steps.version.outputs.should_release == 'true'
        run: |
          git config --global user.email "svc-devrev-sdk@devrev.ai"
          git config --global user.name "svc-devrev-sdk"

      - name: Create tag
        if: steps.version.outputs.should_release == 'true'
        run: git tag ${{ env.NEW_VERSION }}

      - name: Publish
        if: steps.version.outputs.should_release == 'true'
        run: npm publish --provenance --verbose --access public --tag latest

      - name: Push tag
        if: steps.version.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SVC_TOKEN }}
        run: git push --tags

      - name: Open PR to merge stable back to main
        if: steps.version.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SVC_TOKEN }}
        run: |
          gh pr create --base main --head stable \
            --title "chore: merge stable ${{ env.NEW_VERSION }} back to main" \
            --body "Merge stable release ${{ env.NEW_VERSION }} back into main to keep branches in sync." \
            || echo "PR already exists or branches are in sync"

  generate-release-notes:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.should_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update GitHub release documentation
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release.outputs.new_version }}
          name: ${{ needs.release.outputs.new_version }}
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SVC_TOKEN }}
