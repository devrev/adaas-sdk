name: CI
run-name: ${{ github.event_name == 'pull_request' && 'Validate Pull Request' || 'Upload Coverage to Coveralls' }}
on:
  pull_request:
    branches:
      - main
      - v2
      - stable
  push:
    branches:
      - main
      - v2
      - stable

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run slow tests
        run: npm run test:slow

  upload-coverage:
    name: Upload Coverage to Coveralls
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run tests and get coverage
        run: npm run test:coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ./coverage/lcov.info

  check-version-bump:
    name: Check Version Bump
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'stable'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Checkout base branch version
        run: |
          PR_VERSION=$(jq -r '.version' package.json)
          git fetch origin ${{ github.base_ref }}
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:package.json | jq -r '.version')

          echo "Base version (stable): $BASE_VERSION"
          echo "PR version: $PR_VERSION"

          if [ "$PR_VERSION" == "$BASE_VERSION" ]; then
            echo "ERROR: package.json version must be updated when targeting the stable branch"
            echo "Current version on stable: $BASE_VERSION"
            echo "Please bump the version in package.json and package-lock.json"
            exit 1
          fi

          echo "Version bump detected: $BASE_VERSION -> $PR_VERSION"

  test-backwards-compatibility:
    name: Backwards Compatibility Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run backwards compatibility tests
        run: npm run test:backwards-compatibility
