# Commit-message-driven releases for @devrev/ts-adaas.
#
# Merge a PR using the PR title (squash merge) as:
#   beta/X.Y.Z-beta.N   -> publish beta to npm from main
#   release/X.Y         -> create release/X.Y branch and publish X.Y.0 to npm
#   patch/X.Y.Z         -> publish patch from release/X.Y and open backport PR to main
#
# See CONTRIBUTING.md for the full release process.

name: Release automation

on:
  push:
    branches:
      - main
      - "release/**"

concurrency:
  group: release-automation
  cancel-in-progress: false

env:
  NPM_PACKAGE: "@devrev/ts-adaas"
  NODE_VERSION: "22.14.0"

jobs:
  parse-release-command:
    name: Parse release command
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.parse.outputs.command }}
      version: ${{ steps.parse.outputs.version }}
      release_line: ${{ steps.parse.outputs.release_line }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse commit message
        id: parse
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REF_NAME: ${{ github.ref_name }}
        run: bash .github/scripts/parse-release-commit.sh "$COMMIT_MESSAGE" "$REF_NAME"

  beta-release:
    name: Beta release
    needs: parse-release-command
    if: needs.parse-release-command.outputs.command == 'beta'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_SVC_TOKEN }}

      - name: Check authorization
        run: bash .github/scripts/check-authorized-release-actor.sh

      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org/
          node-version: ${{ env.NODE_VERSION }}
          scope: "@devrev"

      - name: Ensure npm 11.5.1+
        run: npm install -g 'npm@>=11.5.1'

      - name: Git configuration
        run: |
          git config --global user.email "svc-devrev-sdk@devrev.ai"
          git config --global user.name "svc-devrev-sdk"

      - name: Set version
        env:
          VERSION: ${{ needs.parse-release-command.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: |
          npm ci
          npm run build
          npm run test

      - name: Commit, tag, and publish
        env:
          VERSION: ${{ needs.parse-release-command.outputs.version }}
        run: |
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: release $VERSION"
          git tag -f "$VERSION"
          npm publish --provenance --verbose --access public --tag beta

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SVC_TOKEN }}
        run: git push origin main && git push --tags

  release-line:
    name: Release line
    needs: parse-release-command
    if: needs.parse-release-command.outputs.command == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      new_version: ${{ needs.parse-release-command.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_SVC_TOKEN }}

      - name: Check authorization
        run: bash .github/scripts/check-authorized-release-actor.sh

      - name: Check release branch does not exist
        env:
          RELEASE_LINE: ${{ needs.parse-release-command.outputs.release_line }}
        run: |
          if git ls-remote --exit-code --heads origin "release/$RELEASE_LINE" >/dev/null 2>&1; then
            echo "::error::Branch release/$RELEASE_LINE already exists"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org/
          node-version: ${{ env.NODE_VERSION }}
          scope: "@devrev"

      - name: Ensure npm 11.5.1+
        run: npm install -g 'npm@>=11.5.1'

      - name: Check npm minor line
        env:
          VERSION: ${{ needs.parse-release-command.outputs.version }}
        run: bash .github/scripts/check-npm-minor-line.sh "$NPM_PACKAGE" "$VERSION"

      - name: Git configuration
        run: |
          git config --global user.email "svc-devrev-sdk@devrev.ai"
          git config --global user.name "svc-devrev-sdk"

      - name: Create release branch and set version
        env:
          VERSION: ${{ needs.parse-release-command.outputs.version }}
          RELEASE_LINE: ${{ needs.parse-release-command.outputs.release_line }}
        run: |
          git checkout -b "release/$RELEASE_LINE"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: |
          npm ci
          npm run build
          npm run test

      - name: Commit, tag, and publish
        env:
          VERSION: ${{ needs.parse-release-command.outputs.version }}
          RELEASE_LINE: ${{ needs.parse-release-command.outputs.release_line }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release $VERSION"
          git tag "$VERSION"
          npm publish --provenance --verbose --access public --tag latest

      - name: Push release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SVC_TOKEN }}
          RELEASE_LINE: ${{ needs.parse-release-command.outputs.release_line }}
        run: |
          git push -u origin "release/$RELEASE_LINE"
          git push --tags

  patch-release:
    name: Patch release
    needs: parse-release-command
    if: needs.parse-release-command.outputs.command == 'patch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      new_version: ${{ needs.parse-release-command.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_SVC_TOKEN }}

      - name: Check authorization
        run: bash .github/scripts/check-authorized-release-actor.sh

      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org/
          node-version: ${{ env.NODE_VERSION }}
          scope: "@devrev"

      - name: Ensure npm 11.5.1+
        run: npm install -g 'npm@>=11.5.1'

      - name: Git configuration
        run: |
          git config --global user.email "svc-devrev-sdk@devrev.ai"
          git config --global user.name "svc-devrev-sdk"

      - name: Set version
        env:
          VERSION: ${{ needs.parse-release-command.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: |
          npm ci
          npm run build
          npm run test

      - name: Commit, tag, and publish
        env:
          VERSION: ${{ needs.parse-release-command.outputs.version }}
        run: |
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: release $VERSION"
          git tag -f "$VERSION"
          npm publish --provenance --verbose --access public --tag latest

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SVC_TOKEN }}
        run: git push origin HEAD && git push --tags

  backport-to-main:
    name: Backport patch to main
    needs: [parse-release-command, patch-release]
    if: needs.parse-release-command.outputs.command == 'patch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_SVC_TOKEN }}

      - name: Check authorization
        run: bash .github/scripts/check-authorized-release-actor.sh

      - name: Git configuration
        run: |
          git config --global user.email "svc-devrev-sdk@devrev.ai"
          git config --global user.name "svc-devrev-sdk"

      - name: Cherry-pick patch merge onto main
        env:
          VERSION: ${{ needs.parse-release-command.outputs.version }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          BACKPORT_BRANCH="backport/patch-$VERSION"
          if git ls-remote --exit-code --heads origin "$BACKPORT_BRANCH" >/dev/null 2>&1; then
            echo "::error::Backport branch $BACKPORT_BRANCH already exists"
            exit 1
          fi
          git fetch origin main
          git checkout -b "$BACKPORT_BRANCH" origin/main
          git cherry-pick "$MERGE_SHA"

      - name: Push backport branch
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SVC_TOKEN }}
          VERSION: ${{ needs.parse-release-command.outputs.version }}
        run: git push origin "backport/patch-$VERSION"

      - name: Open backport pull request
        env:
          GH_TOKEN: ${{ secrets.GH_SVC_TOKEN }}
          VERSION: ${{ needs.parse-release-command.outputs.version }}
          RELEASE_LINE: ${{ needs.parse-release-command.outputs.release_line }}
        run: |
          EXISTING=$(gh pr list --head "backport/patch-$VERSION" --base main --json number --jq '.[0].number')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Backport PR already exists: #$EXISTING"
            exit 0
          fi
          gh pr create \
            --base main \
            --head "backport/patch-$VERSION" \
            --title "backport: patch/$VERSION" \
            --body "$(cat <<EOF
          ## Automated backport

          Cherry-picks patch release \`patch/$VERSION\` from \`release/$RELEASE_LINE\` into \`main\`.

          - [ ] Resolve any cherry-pick conflicts locally if this PR fails checks
          - [ ] Verify tests pass on \`main\`
          - [ ] Merge after review

          Triggered by commit ${{ github.sha }}.
          EOF
          )"

  generate-release-notes:
    name: Generate GitHub release notes
    runs-on: ubuntu-latest
    needs: [parse-release-command, release-line, patch-release]
    if: |
      always() && (
        (needs.parse-release-command.outputs.command == 'release' && needs.release-line.result == 'success') ||
        (needs.parse-release-command.outputs.command == 'patch' && needs.patch-release.result == 'success')
      )
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update GitHub release documentation
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.parse-release-command.outputs.version }}
          name: ${{ needs.parse-release-command.outputs.version }}
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SVC_TOKEN }}
